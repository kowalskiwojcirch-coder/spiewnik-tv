<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Śpiewnik TV - Panel</title>
    <style>
        :root {
            --accent: #ff9800;
            --bg-dark: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #e0e0e0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            background-color: var(--panel-bg);
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 4px 0 10px rgba(0,0,0,0.3);
        }

        h2 { color: var(--accent); font-size: 1.2rem; margin-top: 0; text-transform: uppercase; letter-spacing: 1px; }

        .btn {
            background: #333;
            color: white;
            border: 1px solid #444;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            border-radius: 6px;
            font-weight: 600;
            transition: all 0.2s;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .btn:hover { background: #444; border-color: var(--accent); }
        .btn-primary { background: var(--accent); color: #000; border: none; }
        .btn-primary:hover { background: #e68900; }
        .btn-danger { color: #ff5252; border-color: #552222; }
        .btn-danger:hover { background: #3d1a1a; }

        /* Main Content */
        .main {
            flex-grow: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            color: #888;
        }

        textarea {
            flex-grow: 1;
            background: #000;
            color: var(--accent);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            font-size: 1.4rem;
            line-height: 1.5;
            resize: none;
            outline: none;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
            font-family: Arial, sans-serif;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .status-pill {
            background: #2a2a2a;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid #444;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Sterowanie TV</h2>
    <button class="btn btn-primary" onclick="window.open('display.html', 'TVWindow', 'width=1280,height=720')">Podłącz Telewizor</button>
    
    <div style="margin-top: 30px">
        <label style="font-size: 0.75rem; color: #666;">NAWIGACJA SLAJDAMI</label>
        <div class="controls-grid">
            <button class="btn" onclick="changeSlide(-1)">◀ WSTECZ</button>
            <button class="btn" onclick="changeSlide(1)">DALEJ ▶</button>
        </div>
    </div>

    <button class="btn btn-danger" style="margin-top: auto;" onclick="clearDisplay()">WYCZYŚĆ EKRAN (F12)</button>
</div>

<div class="main">
    <div class="info-bar">
        <span>Edytor Pieśni (użyj podwójnego Entera dla nowego slajdu)</span>
        <span class="status-pill" id="slideCount">Slajd 1 / 1</span>
    </div>
    <textarea id="editor" placeholder="Wpisz tekst tutaj..." oninput="processText()">
Z TEJ BIEDNEJ ZIEMI,
Z TEJ ŁEZ DOLINY.

TĘSKNY SIĘ W NIEBO
UNOSI DŹWIĘK.

O BOSKIE SERCE,
SKARBIE JEDYNY!</textarea>
    <div style="font-size: 0.8rem; color: #555;">Skróty: Strzałki (Lewo/Prawo) - zmiana slajdu | Ctrl+Enter - Wyślij</div>
</div>

<script>
    const bc = new BroadcastChannel('church_system');
    let slides = [];
    let currentIdx = 0;

    function processText() {
        const text = document.getElementById('editor').value;
        slides = text.split(/\n\s*\n/).filter(s => s.trim() !== "");
        if (currentIdx >= slides.length) currentIdx = Math.max(0, slides.length - 1);
        updateUI();
    }

    function updateUI() {
        document.getElementById('slideCount').innerText = `Slajd ${currentIdx + 1} / ${slides.length}`;
        bc.postMessage({ action: 'update', text: slides[currentIdx] });
    }

    function changeSlide(dir) {
        let newIdx = currentIdx + dir;
        if (newIdx >= 0 && newIdx < slides.length) {
            currentIdx = newIdx;
            updateUI();
        }
    }

    function clearDisplay() {
        bc.postMessage({ action: 'clear' });
    }

    window.addEventListener('keydown', (e) => {
        if (document.activeElement.tagName !== 'TEXTAREA') {
            if (e.key === 'ArrowRight') changeSlide(1);
            if (e.key === 'ArrowLeft') changeSlide(-1);
        }
        if (e.key === 'F12') clearDisplay();
    });

    // Start
    processText();
</script>

</body>
</html>
