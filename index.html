<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Panel Sterowania - Śpiewnik</title>
    <style>
        :root {
            --bg-dark: #1a1a1a;
            --panel-grey: #2e2e2e;
            --accent-orange: #ff8c00;
            --text-grey: #cccccc;
        }

        body {
            background-color: #000;
            color: var(--text-grey);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* Lewy pasek boczny */
        .sidebar {
            width: 250px;
            background-color: var(--panel-grey);
            display: flex;
            flex-direction: column;
            border-right: 2px solid #000;
        }

        .header-bar {
            background-color: var(--accent-orange);
            color: #000;
            padding: 5px 10px;
            font-weight: bold;
            font-size: 14px;
        }

        .btn {
            background-color: var(--panel-grey);
            color: var(--accent-orange);
            border: 1px solid #444;
            padding: 10px;
            margin: 5px;
            cursor: pointer;
            text-align: center;
            font-size: 12px;
            text-transform: uppercase;
        }

        .btn:hover { background-color: #3e3e3e; }
        .btn:active { background-color: var(--accent-orange); color: #000; }

        .nav-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            padding: 5px;
        }

        /* Główny obszar */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .preview-box {
            background-color: #000;
            border: 1px solid #444;
            flex-grow: 1;
            color: var(--accent-orange);
            font-family: 'Courier New', monospace;
            padding: 20px;
            font-size: 18px;
            white-space: pre-wrap;
            text-transform: uppercase;
        }

        .status-bar {
            padding: 10px;
            font-size: 12px;
            text-align: right;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="header-bar">Śpiewnik - Kontrola</div>
    <button class="btn" onclick="openDisplay()">Otwórz okno TV</button>
    <button class="btn">Załaduj Pieśń</button>
    <div style="margin-top:20px; text-align:center; font-size:10px;">PROJEKCJA</div>
    <div class="nav-grid">
        <button class="btn" onclick="prevSlide()"><</button>
        <button class="btn" onclick="nextSlide()">></button>
    </div>
    <div style="margin-top:auto;">
        <button class="btn" style="width: calc(100% - 10px);" onclick="sendToDisplay()">Wyślij bieżący slajd</button>
        <button class="btn" style="width: calc(100% - 10px); color: red;" onclick="clearDisplay()">Wyczyść tablicę</button>
    </div>
</div>

<div class="main-content">
    <div class="preview-box" id="preview">
1.
Z TEJ BIEDNEJ ZIEMI, Z TEJ ŁEZ DOLINY
TĘSKNY SIĘ W NIEBO UNOSI DŹWIĘK.
O BOSKIE SERCE, SKARBIE JEDYNY,
WYSŁUCHAJ GRZESZNYCH SERC NASZYCH JĘK.
    </div>
    <div class="status-bar" id="status">Slajd 1/1</div>
</div>

<script>
    const bc = new BroadcastChannel('church_tv');
    let currentText = document.getElementById('preview').innerText;

    function openDisplay() {
        window.open('display.html', 'ChurchDisplay', 'width=800,height=600');
    }

    function sendToDisplay() {
        const text = document.getElementById('preview').innerText;
        bc.postMessage({ type: 'UPDATE', text: text });
    }

    function clearDisplay() {
        bc.postMessage({ type: 'CLEAR' });
    }

    // Prosta nawigacja (można rozbudować o bazę JSON)
    function nextSlide() { console.log("Next"); sendToDisplay(); }
    function prevSlide() { console.log("Prev"); sendToDisplay(); }
</script>

</body>
</html>
