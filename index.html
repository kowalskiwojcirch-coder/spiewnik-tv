<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Panel Operatora - System Slajdów</title>
    <style>
        :root { --orange: #ff8c00; --bg: #1a1a1a; }
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; height: 100vh; margin: 0; }
        .sidebar { width: 300px; background: #222; padding: 15px; border-right: 2px solid #000; display: flex; flex-direction: column; }
        .main { flex-grow: 1; padding: 20px; display: flex; flex-direction: column; background: var(--bg); }
        
        textarea { 
            flex-grow: 1; background: #000; color: var(--orange); border: 1px solid #444;
            padding: 15px; font-family: monospace; font-size: 16px; resize: none;
        }
        
        .controls { margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { 
            padding: 12px; background: #333; color: var(--orange); border: 1px solid var(--orange); 
            cursor: pointer; font-weight: bold; text-transform: uppercase;
        }
        .btn:hover { background: var(--orange); color: #000; }
        .status { margin-top: 10px; font-size: 12px; color: #888; text-align: center; }
        p { font-size: 11px; color: #aaa; }
    </style>
</head>
<body>

<div class="sidebar">
    <h3>KONFIGURACJA</h3>
    <button class="btn" onclick="window.open('display.html', '_blank')">1. OTWÓRZ EKRAN TV</button>
    <p>Wpisz tekst poniżej. Oddzielaj slajdy podwójnym Enterem.</p>
    <div class="controls">
        <button class="btn" onclick="prevSlide()">◀ POPRZEDNI</button>
        <button class="btn" onclick="nextSlide()">NASTĘPNY ▶</button>
    </div>
    <div class="status" id="slideNum">Slajd: 1 / 1</div>
    <button class="btn" style="margin-top:20px; border-color: red; color: red;" onclick="clearAll()">WYCZYŚĆ TV</button>
</div>

<div class="main">
    <textarea id="textInput" oninput="updateSlides()">
BĘDĘ PANU W KAŻDEJ
PORZE ŚPIEWAŁ PIEŚŃ.

WDZIĘCZNOŚCI. NIECH
Z UST MOICH CHWAŁA.

JEGO NIEUSTANNIE
PŁYNIE ĆĄÓŹĘŁŃ.</textarea>
</div>

<script>
    const bc = new BroadcastChannel('church_system');
    let slides = [];
    let currentIdx = 0;

    function updateSlides() {
        const rawText = document.getElementById('textInput').value;
        // Dzieli tekst na slajdy przy podwójnym enterze
        slides = rawText.split(/\n\s*\n/).filter(s => s.trim() !== "");
        if (currentIdx >= slides.length) currentIdx = Math.max(0, slides.length - 1);
        updateLabel();
        send();
    }

    function send() {
        if (slides[currentIdx]) {
            bc.postMessage({ action: 'update', text: slides[currentIdx].trim() });
        }
    }

    function nextSlide() {
        if (currentIdx < slides.length - 1) {
            currentIdx++;
            updateLabel();
            send();
        }
    }

    function prevSlide() {
        if (currentIdx > 0) {
            currentIdx--;
            updateLabel();
            send();
        }
    }

    function updateLabel() {
        document.getElementById('slideNum').innerText = `Slajd: ${currentIdx + 1} / ${slides.length}`;
    }

    function clearAll() {
        bc.postMessage({ action: 'clear' });
    }

    // Obsługa strzałek na klawiaturze
    window.addEventListener('keydown', (e) => {
        if (e.target.tagName !== 'TEXTAREA') {
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
        }
    });

    updateSlides();
</script>
</body>
</html>
