<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Sterowania LED - 8 Linii</title>
    <style>
        :root {
            --accent: #ff9d00;
            --bg: #0f0f0f;
            --card: #1e1e1e;
            --text: #e0e0e0;
            --danger: #ff4444;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            background-color: var(--card);
            padding: 25px;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 1rem;
            color: var(--accent);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn {
            padding: 14px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: 0.2s;
        }

        .btn-primary { background: var(--accent); color: #000; }
        .btn-outline { background: transparent; border: 1px solid #444; color: #ccc; }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
        .btn-danger { color: var(--danger); border: 1px solid #522; background: transparent; }

        .status-pill {
            background: #252525;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #333;
        }

        #lineCount { font-size: 0.8rem; margin-top: 5px; font-weight: bold; }

        /* Edytor */
        .main {
            flex-grow: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        .editor-container {
            flex-grow: 1;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        textarea {
            flex-grow: 1;
            background: #000;
            color: var(--accent);
            border: 2px solid #222;
            border-radius: 12px;
            padding: 20px;
            font-size: 1.8rem;
            line-height: 1.4; /* Ważne dla 8 linii */
            resize: none;
            outline: none;
            font-family: Arial, sans-serif;
            font-weight: 100;
        }

        textarea:focus { border-color: var(--accent); }

        .nav-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h1>System Pieśni LED</h1>
    
    <button class="btn btn-primary" onclick="window.open('display.html', 'TV', 'width=1280,height=720')">Otwórz ekran TV</button>

    <div class="status-pill">
        <div id="slideInfo">Slajd: 0 / 0</div>
        <div id="lineCount">Linie w slajdzie: 0 / 8</div>
    </div>

    <div class="nav-controls">
        <button class="btn btn-outline" onclick="changeSlide(-1)">◀ Wstecz</button>
        <button class="btn btn-outline" onclick="changeSlide(1)">Dalej ▶</button>
    </div>

    <button class="btn btn-danger" style="margin-top: auto;" onclick="clearAll()">Wyczyść wszystko</button>
</div>

<div class="main">
    <div style="margin-bottom: 10px; color: #555; font-size: 0.8rem;">
        Wpisz tekst. Pamiętaj: max 8 linii na slajd. Nowy slajd = podwójny Enter.
    </div>
    <div class="editor-container">
        <textarea id="editor" placeholder="Wpisz pieśń..." oninput="validateAndProcess()"></textarea>
    </div>
</div>

<script>
    const bc = new BroadcastChannel('church_system');
    const editor = document.getElementById('editor');
    let slides = [];
    let currentIdx = 0;

    function validateAndProcess() {
        const text = editor.value;
        
        // Rozdzielamy na slajdy
        slides = text.split(/\n\s*\n/).filter(s => s.trim() !== "");
        
        // Sprawdzanie ilości linii w aktualnym slajdzie
        // (Wyszukujemy slajd, w którym aktualnie znajduje się kursor)
        const cursorSettings = editor.value.substring(0, editor.selectionStart).split(/\n\s*\n/);
        const currentEditIdx = cursorSettings.length - 1;
        
        if (slides[currentEditIdx]) {
            const linesInCurrent = slides[currentEditIdx].split('\n').length;
            const lineLabel = document.getElementById('lineCount');
            lineLabel.innerText = `Linie w slajdzie: ${linesInCurrent} / 8`;
            
            if (linesInCurrent > 8) {
                lineLabel.style.color = "red";
            } else {
                lineLabel.style.color = "var(--accent)";
            }
        }

        // Aktualizacja widoku na TV
        if (currentIdx >= slides.length) currentIdx = Math.max(0, slides.length - 1);
        updateTV();
    }

    function updateTV() {
        const content = slides[currentIdx] || "";
        document.getElementById('slideInfo').innerText = `Slajd: ${slides.length > 0 ? currentIdx + 1 : 0} / ${slides.length}`;
        bc.postMessage({ action: 'update', text: content.trim() });
    }

    function changeSlide(dir) {
        if (slides[currentIdx + dir] !== undefined) {
            currentIdx += dir;
            updateTV();
        }
    }

    function clearAll() {
        editor.value = '';
        slides = [];
        currentIdx = 0;
        bc.postMessage({ action: 'update', text: '' });
        validateAndProcess();
    }

    // Strzałki na klawiaturze (tylko gdy nie piszemy w edytorze)
    window.addEventListener('keydown', (e) => {
        if (document.activeElement !== editor) {
            if (e.key === 'ArrowRight') changeSlide(1);
            if (e.key === 'ArrowLeft') changeSlide(-1);
        }
    });

    // Blokada 9 linii w jednym slajdzie (opcjonalne, ale pomocne)
    editor.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const currentText = editor.value.substring(0, editor.selectionStart).split(/\n\s*\n/).pop();
            const lines = currentText.split('\n').length;
            
            // Jeśli mamy 8 linii i wciskamy Enter, a nie jest to podwójny Enter na nowy slajd
            if (lines >= 8 && !e.shiftKey) {
                // Pozwól na enter tylko jeśli to będzie podwójny enter (nowy slajd)
                const lastChar = editor.value.substring(editor.selectionStart - 1, editor.selectionStart);
                if (lastChar !== '\n') {
                    // Tutaj moglibyśmy zablokować, ale lepiej dać ostrzeżenie kolorem
                }
            }
        }
    });

    validateAndProcess();
</script>
</body>
</html>
