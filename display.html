<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <style>
        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            color: #ff9d00;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            font-weight: 900;
            text-transform: uppercase;
        }

        /* TŁO: GIGANTYCZNE WYŁĄCZONE DIODY */
        .matrix-dots-bg {
            position: absolute;
            width: 100%; height: 100%;
            /* Wielkie, ciemne wgłębienia na diody */
            background-image: radial-gradient(#1a1a1a 35%, transparent 40%);
            background-size: 40px 40px; /* <--- GIGANTYCZNY ROZMIAR */
            z-index: 1;
        }

        /* GRUBE CZARNE RAMY (Fugi między modułami) */
        .led-grid {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            /* Bardzo grube czarne pasy oddzielające diody */
            background-image: 
                linear-gradient(rgba(0,0,0,1) 8px, transparent 8px),
                linear-gradient(90deg, rgba(0,0,0,1) 8px, transparent 8px);
            background-size: 40px 40px;
            z-index: 10;
            pointer-events: none;
        }

        /* TEKST ROZBITY NA WIELKIE KROPKI */
        #display-text {
            width: 95%;
            font-size: 12vw; /* Jeszcze większy font */
            line-height: 1.0;
            text-align: left;
            white-space: pre-wrap;
            z-index: 5;
            letter-spacing: -5px;
            
            /* MASKA: ROBI WIELKIE KULE ŚWIATŁA Z LITER */
            -webkit-mask-image: radial-gradient(circle, white 45%, transparent 55%);
            mask-image: radial-gradient(circle, white 45%, transparent 55%);
            mask-size: 40px 40px; /* Synchronizacja z tłem */

            /* Ekstremalny blask diody */
            text-shadow: 
                0 0 15px #ff9d00,
                0 0 30px rgba(255, 157, 0, 0.6);
            
            transition: opacity 0.2s ease;
        }
    </style>
</head>
<body>

    <div class="matrix-dots-bg"></div>
    <div class="led-grid"></div>
    <div id="display-text">WIELKIE<br>KROPKI</div>

    <script>
        const bc = new BroadcastChannel('church_system');
        const box = document.getElementById('display-text');

        bc.onmessage = (msg) => {
            if (msg.data.action === 'update') {
                box.innerText = msg.data.text;
            } else if (msg.data.action === 'clear') {
                box.innerText = '';
            }
        };
    </script>
</body>
</html>
