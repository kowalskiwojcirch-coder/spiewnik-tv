<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; background: #000; color: #ff9d00;
            height: 100vh; width: 100vw; overflow: hidden;
            font-family: Arial, sans-serif; font-weight: 100;
        }

        .led-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255,255,255,0.01) 1px, transparent 1px);
            background-size: 16px 16px; z-index: 1;
        }

        /* GWIAZDKI */
        .corner-star {
            position: absolute; 
            font-size: 130px; 
            color: #ff9d00;
            opacity: 0; 
            z-index: 20; 
            transition: opacity 0.5s ease-in-out;
            text-shadow: 0 0 30px rgba(255, 157, 0, 0.8), 0 0 10px #ff9d00;
            /* POWRÓT DO GĘSTSZYCH KROPEK NA GWIAZDKACH */
            -webkit-mask-image: radial-gradient(circle, white 38%, transparent 55%);
            mask-size: 8px 8px;
            font-weight: bold;
        }
        
        body.no-text .corner-star { opacity: 0.9; }
        
        .tl { top: 30px; left: 40px; } .tr { top: 30px; right: 40px; }
        .bl { bottom: 30px; left: 40px; } .br { bottom: 30px; right: 40px; }

        /* KONTENER */
        #viewport {
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.4s ease-in-out;
            z-index: 10;
        }

        /* TEKST - POWRÓT DO TWOICH ULUBIONYCH KROPEK */
        #text-shifter {
            display: inline-block;
            white-space: pre-wrap;
            text-align: left;
            line-height: 1.2; 
            letter-spacing: 0.05em;
            transform-origin: center;
            font-size: 120px; 

            /* TWOJA MASKA KROPEK (0.09em) */
            -webkit-mask-image: radial-gradient(circle, white 38%, transparent 55%);
            mask-image: radial-gradient(circle, white 38%, transparent 55%);
            mask-size: 0.09em 0.09em; 

            text-shadow: 0 0 12px rgba(255, 157, 0, 0.5);
        }

        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, transparent 2px);
            z-index: 15; pointer-events: none;
        }

        .fade-hidden { opacity: 0 !important; }
    </style>
</head>
<body class="no-text">

    <div class="corner-star tl">*</div><div class="corner-star tr">*</div>
    <div class="corner-star bl">*</div><div class="corner-star br">*</div>

    <div class="led-bg"></div>
    <div class="scanlines"></div>
    
    <div id="viewport">
        <div id="text-shifter"></div>
    </div>

    <script>
        const bc = new BroadcastChannel('church_system');
        const shifter = document.getElementById('text-shifter');
        const viewport = document.getElementById('viewport');
        const body = document.body;

        function forceScale() {
            shifter.style.transform = "scale(1)";
            const vW = window.innerWidth * 0.82; 
            const vH = window.innerHeight * 0.82; 
            const tW = shifter.offsetWidth;
            const tH = shifter.offsetHeight;
            const finalScale = Math.min(vW / tW, vH / tH);
            shifter.style.transform = `scale(${finalScale})`;
        }

        bc.onmessage = (msg) => {
            if (msg.data.action === 'update') {
                const content = msg.data.text ? msg.data.text : "";
                viewport.classList.add('fade-hidden');

                setTimeout(() => {
                    shifter.innerText = content;
                    if (content.trim() === "") {
                        body.classList.add('no-text');
                    } else {
                        body.classList.remove('no-text');
                        forceScale();
                    }
                    requestAnimationFrame(() => {
                        viewport.classList.remove('fade-hidden');
                    });
                }, 400); 
            }
        };

        window.onresize = forceScale;
        window.onload = forceScale;
    </script>
</body>
</html>
