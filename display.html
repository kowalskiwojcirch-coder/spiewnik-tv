<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <style>
        body, html {
            margin: 0; padding: 0; background: #000; color: #ff9d00;
            height: 100vh; width: 100vw; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            font-family: Arial, sans-serif; font-weight: 100; text-transform: uppercase;
        }

        .led-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255,255,255,0.01) 1px, transparent 1px);
            background-size: 16px 16px; z-index: 1;
        }

        /* GWIAZDKI */
        .corner-star {
            position: absolute;
            font-size: 100px;
            color: #ff9d00;
            opacity: 0;
            z-index: 20;
            -webkit-mask-image: radial-gradient(circle, white 40%, transparent 60%);
            mask-size: 10px 10px;
            text-shadow: 0 0 20px rgba(255, 157, 0, 0.6);
        }

        body.no-text .corner-star { opacity: 0.7; }

        .tl { top: 30px; left: 30px; }
        .tr { top: 30px; right: 30px; }
        .bl { bottom: 30px; left: 30px; }
        .br { bottom: 30px; right: 30px; }

        /* TEKST - KLUCZOWE ZMIANY */
        #display-text {
            position: relative; 
            width: 98vw; /* Szerzej */
            z-index: 10;
            text-align: left; 
            white-space: pre-wrap;
            
            /* BARDZO CIASNE LINIE - to pozwala literom urosnąć */
            line-height: 0.85; 
            letter-spacing: 0.05em;
            
            /* GIGANTYCZNY START */
            font-size: 25vh; 

            -webkit-mask-image: radial-gradient(circle, white 42%, transparent 58%);
            mask-image: radial-gradient(circle, white 42%, transparent 58%);
            mask-size: 0.07em 0.07em; 

            text-shadow: 0 0 15px rgba(255, 157, 0, 0.4);
        }

        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, transparent 2px);
            z-index: 15; pointer-events: none;
        }
    </style>
</head>
<body class="no-text">

    <div class="corner-star tl">*</div>
    <div class="corner-star tr">*</div>
    <div class="corner-star bl">*</div>
    <div class="corner-star br">*</div>

    <div class="led-bg"></div>
    <div class="scanlines"></div>
    <div id="display-text"></div>

    <script>
        const bc = new BroadcastChannel('church_system');
        const box = document.getElementById('display-text');
        const body = document.body;

        function adjustFontSize() {
            // Startujemy od absolutnego maksimum
            let fontSize = 25; 
            box.style.fontSize = fontSize + "vh";

            // Skrypt dopasowuje tekst do wysokości ekranu (92% wysokości max)
            // i szerokości (96% szerokości max)
            const maxHeight = window.innerHeight * 0.92;
            const maxWidth = window.innerWidth * 0.96;

            while ((box.scrollHeight > maxHeight || box.scrollWidth > maxWidth) && fontSize > 1) {
                fontSize -= 0.1; // Bardziej precyzyjne skalowanie
                box.style.fontSize = fontSize + "vh";
            }
        }

        bc.onmessage = (msg) => {
            if (msg.data.action === 'update') {
                const content = msg.data.text ? msg.data.text.trim() : "";
                box.innerText = content;
                
                if (content === "") {
                    body.classList.add('no-text');
                } else {
                    body.classList.remove('no-text');
                }
                
                // Wykonaj skalowanie po krótkiej chwili, by DOM zdążył się odświeżyć
                setTimeout(adjustFontSize, 20);
            }
        };

        // Kiedy zmieniasz okno (np. F11), tekst od razu puchnie
        window.onresize = () => {
            setTimeout(adjustFontSize, 50);
        };
        
        adjustFontSize();
    </script>
</body>
</html>
