<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <style>
        body, html {
            margin: 0; padding: 0; background: #000; color: #ff9d00;
            height: 100vh; width: 100vw; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            font-family: Arial, Helvetica, sans-serif; font-weight: 100; text-transform: uppercase;
        }

        .led-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255,255,255,0.01) 1px, transparent 1px);
            background-size: 16px 16px; z-index: 1;
        }

        /* GWIAZDKI - STATYCZNE I WIELKIE */
        .corner-star {
            position: absolute; font-size: 120px; color: #ff9d00;
            opacity: 0; z-index: 20; transition: opacity 0.2s;
            -webkit-mask-image: radial-gradient(circle, white 40%, transparent 60%);
            mask-size: 12px 12px;
        }
        body.no-text .corner-star { opacity: 0.7; }
        .tl { top: 10px; left: 10px; } .tr { top: 10px; right: 10px; }
        .bl { bottom: 10px; left: 10px; } .br { bottom: 10px; right: 10px; }

        /* KONTENER Z BŁYSKAWICZNĄ ANIMACJĄ */
        #display-container {
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.1s ease-in-out; /* TURBO SZYBKO */
            opacity: 1; z-index: 10;
        }

        /* TEKST - ABSOLUTNY MAKSYMALNY ROZMIAR */
        #display-text {
            width: 98%;
            text-align: left; white-space: pre-wrap;
            line-height: 0.72; /* Ekstremalnie ciasno = wielkie litery */
            letter-spacing: -0.01em; 
            font-size: 40vh; /* Start od ogromnej wartości */
            
            -webkit-mask-image: radial-gradient(circle, white 45%, transparent 55%);
            mask-image: radial-gradient(circle, white 45%, transparent 55%);
            mask-size: 0.05em 0.05em; 

            text-shadow: 0 0 10px rgba(255, 157, 0, 0.4);
            display: inline-block;
        }

        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, transparent 2px);
            z-index: 15; pointer-events: none;
        }

        .fade-out { opacity: 0 !important; }
    </style>
</head>
<body class="no-text">

    <div class="corner-star tl">*</div><div class="corner-star tr">*</div>
    <div class="corner-star bl">*</div><div class="corner-star br">*</div>

    <div class="led-bg"></div>
    <div class="scanlines"></div>
    
    <div id="display-container">
        <div id="display-text"></div>
    </div>

    <script>
        const bc = new BroadcastChannel('church_system');
        const box = document.getElementById('display-text');
        const container = document.getElementById('display-container');
        const body = document.body;

        function adjustFontSize() {
            let fontSize = 40; // Mega start
            box.style.fontSize = fontSize + "vh";

            // Wykorzystujemy 98% wysokości i szerokości okna
            const maxHeight = window.innerHeight * 0.98;
            const maxWidth = window.innerWidth * 0.98;

            while ((box.scrollHeight > maxHeight || box.scrollWidth > maxWidth) && fontSize > 1) {
                fontSize -= 0.3;
                box.style.fontSize = fontSize + "vh";
            }
        }

        bc.onmessage = (msg) => {
            if (msg.data.action === 'update') {
                const content = msg.data.text ? msg.data.text.trim() : "";
                
                // Szybkie wygaszanie
                container.classList.add('fade-out');

                setTimeout(() => {
                    box.innerText = content;
                    
                    if (content === "") {
                        body.classList.add('no-text');
                    } else {
                        body.classList.remove('no-text');
                        adjustFontSize();
                    }
                    // Szybkie pojawienie
                    container.classList.remove('fade-out');
                }, 100); // Tylko 100ms przerwy
            }
        };

        window.onresize = adjustFontSize;
    </script>
</body>
</html>
