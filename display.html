<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <style>
        /* Importujemy czcionkę, która natywnie ma układ kropek 5x7 */
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');

        body, html { 
            margin: 0; padding: 0; background: #050505; 
            height: 100vh; width: 100vw; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* TŁO: SIATKA MODUŁÓW (Większe kwadraty - monitorki) */
        .module-grid {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0,0,0,1) 3px, transparent 3px),
                linear-gradient(90deg, rgba(0,0,0,1) 3px, transparent 3px);
            background-size: 15px 15px; /* DUŻY ROZMIAR KROPKI */
            z-index: 10;
            pointer-events: none;
        }

        /* TEKST: WYRAŹNE KROPKI */
        #display-text {
            color: #ff9000;
            /* Używamy czcionki gotyckiej/pixelowej dla lepszego efektu kropkowego */
            font-family: 'DotGothic16', 'Courier New', monospace; 
            font-size: 10vw; 
            font-weight: normal;
            line-height: 1.2;
            text-align: left;
            width: 90%;
            white-space: pre-wrap;
            text-transform: uppercase;
            letter-spacing: 8px; /* Odstępy między literami jak na tablicy */

            /* MASKA: TYLKO KILKA DUŻYCH KROPEK NA LITERĘ */
            -webkit-mask-image: radial-gradient(circle, white 35%, transparent 50%);
            mask-image: radial-gradient(circle, white 35%, transparent 50%);
            mask-size: 15px 15px; /* MUSI BYĆ TAKA SAMA JAK background-size wyżej! */
            
            /* Mocny blask pojedynczej diody */
            text-shadow: 0 0 8px rgba(255, 144, 0, 0.8);
        }

        /* SYMULACJA WYŁĄCZONYCH DIOD (Cienie w tle) */
        .empty-dots {
            position: absolute;
            width: 100%; height: 100%;
            background-image: radial-gradient(rgba(20, 20, 20, 1) 20%, transparent 25%);
            background-size: 15px 15px;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="empty-dots"></div>
    <div class="module-grid"></div>
    <div id="display-text">BĘDĘ PANU<br>W KAŻDEJ PORZE</div>

    <script>
        const bc = new BroadcastChannel('church_system');
        bc.onmessage = (m) => {
            const el = document.getElementById('display-text');
            if (m.data.action === 'update') el.innerText = m.data.text;
            if (m.data.action === 'clear') el.innerText = '';
        };
    </script>
</body>
</html>
