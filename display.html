<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; background: #000; color: #ff9d00;
            height: 100vh; width: 100vw; overflow: hidden;
            font-family: Arial, sans-serif; font-weight: 100; text-transform: uppercase;
        }

        .led-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255,255,255,0.01) 1px, transparent 1px);
            background-size: 16px 16px; z-index: 1;
        }

        /* GWIAZDKI */
        .corner-star {
            position: absolute; font-size: 120px; color: #ff9d00;
            opacity: 0; z-index: 20; transition: opacity 0.1s;
            -webkit-mask-image: radial-gradient(circle, white 40%, transparent 60%);
            mask-size: 12px 12px;
        }
        body.no-text .corner-star { opacity: 0.8; }
        .tl { top: 10px; left: 20px; } .tr { top: 10px; right: 20px; }
        .bl { bottom: 10px; left: 20px; } .br { bottom: 10px; right: 20px; }

        /* KONTENER GŁÓWNY */
        #viewport {
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.08s ease-in-out;
            z-index: 10;
        }

        /* BLOK TEKSTU - TO GO BĘDZIEMY SKALOWAĆ */
        #text-shifter {
            display: inline-block;
            white-space: pre-wrap;
            text-align: left;
            line-height: 0.75; /* Ciasno, by litery były wyższe */
            letter-spacing: -0.01em;
            transform-origin: center; /* Powiększaj od środka */
            
            /* Stały, duży font bazowy */
            font-size: 120px; 

            -webkit-mask-image: radial-gradient(circle, white 45%, transparent 55%);
            mask-image: radial-gradient(circle, white 45%, transparent 55%);
            mask-size: 6px 6px; /* Kropki dopasowane do skali */

            text-shadow: 0 0 10px rgba(255, 157, 0, 0.4);
        }

        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, transparent 2px);
            z-index: 15; pointer-events: none;
        }

        .fade-out { opacity: 0 !important; }
    </style>
</head>
<body class="no-text">

    <div class="corner-star tl">*</div><div class="corner-star tr">*</div>
    <div class="corner-star bl">*</div><div class="corner-star br">*</div>

    <div class="led-bg"></div>
    <div class="scanlines"></div>
    
    <div id="viewport">
        <div id="text-shifter"></div>
    </div>

    <script>
        const bc = new BroadcastChannel('church_system');
        const shifter = document.getElementById('text-shifter');
        const viewport = document.getElementById('viewport');
        const body = document.body;

        function forceScale() {
            // Resetujemy skalę do obliczeń
            shifter.style.transform = "scale(1)";
            
            const vW = window.innerWidth * 0.96; // 96% szerokości ekranu
            const vH = window.innerHeight * 0.96; // 96% wysokości ekranu
            
            const tW = shifter.offsetWidth;
            const tH = shifter.offsetHeight;

            // Obliczamy współczynnik powiększenia dla szerokości i wysokości
            const scaleX = vW / tW;
            const scaleY = vH / tH;

            // Wybieramy mniejszy współczynnik, żeby tekst nie wystawał, 
            // ale wypełnił ekran do oporu w jednej z osi.
            const finalScale = Math.min(scaleX, scaleY);

            shifter.style.transform = `scale(${finalScale})`;
        }

        bc.onmessage = (msg) => {
            if (msg.data.action === 'update') {
                const content = msg.data.text ? msg.data.text.trim() : "";
                
                viewport.classList.add('fade-out');

                setTimeout(() => {
                    shifter.innerText = content;
                    
                    if (content === "") {
                        body.classList.add('no-text');
                    } else {
                        body.classList.remove('no-text');
                        // Dajemy przeglądarce milisekundę na wyrenderowanie tekstu przed skalowaniem
                        forceScale();
                    }
                    viewport.classList.remove('fade-out');
                }, 80);
            }
        };

        // Reaguj na F11 i każdą zmianę okna
        window.onresize = forceScale;
        
        // Pierwsze odpalenie
        window.onload = forceScale;
    </script>
</body>
</html>
