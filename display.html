<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <style>
        body, html {
            margin: 0; padding: 0; background: #000; color: #ff9d00;
            height: 100vh; width: 100vw; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            font-family: Arial, sans-serif; font-weight: 100; text-transform: uppercase;
        }

        /* TŁO MATRYCY */
        .led-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255,255,255,0.01) 1px, transparent 1px);
            background-size: 16px 16px; z-index: 1;
        }

        /* STATYCZNE GWIAZDKI W ROGACH */
        .corner-star {
            position: absolute;
            font-size: 120px; /* Wielkie */
            color: #ff9d00;
            opacity: 0; /* Ukryte gdy jest tekst */
            z-index: 20;
            /* Ta sama maska co tekst - efekt kropek */
            -webkit-mask-image: radial-gradient(circle, white 40%, transparent 60%);
            mask-size: 12px 12px;
            text-shadow: 0 0 20px rgba(255, 157, 0, 0.6);
            transition: opacity 0.3s ease;
        }

        /* Pokazuj tylko gdy nie ma tekstu */
        body.no-text .corner-star {
            opacity: 0.7; /* Świecą światłem ciągłym */
        }

        .tl { top: 40px; left: 40px; }
        .tr { top: 40px; right: 40px; }
        .bl { bottom: 40px; left: 40px; }
        .br { bottom: 40px; right: 40px; }

        /* TEKST GŁÓWNY */
        #display-text {
            position: relative; 
            width: 96vw; 
            z-index: 10;
            text-align: left; 
            white-space: pre-wrap;
            line-height: 1.0; 
            letter-spacing: 0.08em;
            
            /* POCZĄTKOWY ROZMIAR */
            font-size: 22vh; 

            /* KROPKI */
            -webkit-mask-image: radial-gradient(circle, white 40%, transparent 55%);
            mask-image: radial-gradient(circle, white 40%, transparent 55%);
            mask-size: 0.08em 0.08em; 

            text-shadow: 0 0 15px rgba(255, 157, 0, 0.5);
        }

        /* Delikatne linie rastrowe */
        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, transparent 2px);
            z-index: 15; pointer-events: none;
        }
    </style>
</head>
<body class="no-text">

    <div class="corner-star tl">*</div>
    <div class="corner-star tr">*</div>
    <div class="corner-star bl">*</div>
    <div class="corner-star br">*</div>

    <div class="led-bg"></div>
    <div class="scanlines"></div>
    <div id="display-text"></div>

    <script>
        const bc = new BroadcastChannel('church_system');
        const box = document.getElementById('display-text');
        const body = document.body;

        function adjustFontSize() {
            let fontSize = 22; 
            box.style.fontSize = fontSize + "vh";

            // Skaluje tekst tak, by wypełniał ekran przy zachowaniu czytelności
            while ((box.scrollHeight > window.innerHeight * 0.95 || box.scrollWidth > window.innerWidth * 0.96) && fontSize > 2) {
                fontSize -= 0.2;
                box.style.fontSize = fontSize + "vh";
            }
        }

        bc.onmessage = (msg) => {
            if (msg.data.action === 'update') {
                const content = msg.data.text ? msg.data.text.trim() : "";
                box.innerText = content;
                
                if (content === "") {
                    body.classList.add('no-text');
                } else {
                    body.classList.remove('no-text');
                }
                
                requestAnimationFrame(adjustFontSize);
            }
        };

        window.onresize = adjustFontSize;
        adjustFontSize();
    </script>
</body>
</html>
