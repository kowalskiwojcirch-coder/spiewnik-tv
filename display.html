<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; background: #000; color: #ff9d00;
            height: 100vh; width: 100vw; overflow: hidden;
            font-family: Arial, sans-serif; font-weight: 100;
        }

        .led-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255,255,255,0.01) 1px, transparent 1px);
            background-size: 16px 16px; z-index: 1;
        }

        /* GWIAZDKI - BARDZIEJ WIDOCZNE */
        .corner-star {
            position: absolute; 
            font-size: 130px; /* Nieco większe */
            color: #ff9d00;
            opacity: 0; 
            z-index: 20; 
            transition: opacity 0.2s;
            /* Mocniejszy blask */
            text-shadow: 0 0 30px rgba(255, 157, 0, 0.9), 0 0 10px #ff9d00;
            -webkit-mask-image: radial-gradient(circle, white 50%, transparent 70%);
            mask-size: 10px 10px;
            font-weight: bold; /* Pogrubione dla widoczności */
        }
        
        body.no-text .corner-star { 
            opacity: 0.9; /* Bardzo widoczne */
        }
        
        .tl { top: 30px; left: 40px; } .tr { top: 30px; right: 40px; }
        .bl { bottom: 30px; left: 40px; } .br { bottom: 30px; right: 40px; }

        /* KONTENER */
        #viewport {
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.1s ease-in-out;
            z-index: 10;
        }

        /* TEKST - LUŹNIEJSZY I MNIEJSZY */
        #text-shifter {
            display: inline-block;
            white-space: pre-wrap;
            text-align: left;
            /* ZWIĘKSZONY ODSTĘP (tekst nie jest już tak blisko siebie) */
            line-height: 1.2; 
            letter-spacing: 0.05em;
            transform-origin: center;
            
            font-size: 100px; 

            -webkit-mask-image: radial-gradient(circle, white 45%, transparent 55%);
            mask-image: radial-gradient(circle, white 45%, transparent 55%);
            mask-size: 5px 5px;

            text-shadow: 0 0 12px rgba(255, 157, 0, 0.5);
        }

        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, transparent 2px);
            z-index: 15; pointer-events: none;
        }

        .fade-out { opacity: 0 !important; }
    </style>
</head>
<body class="no-text">

    <div class="corner-star tl">*</div><div class="corner-star tr">*</div>
    <div class="corner-star bl">*</div><div class="corner-star br">*</div>

    <div class="led-bg"></div>
    <div class="scanlines"></div>
    
    <div id="viewport">
        <div id="text-shifter"></div>
    </div>

    <script>
        const bc = new BroadcastChannel('church_system');
        const shifter = document.getElementById('text-shifter');
        const viewport = document.getElementById('viewport');
        const body = document.body;

        function forceScale() {
            shifter.style.transform = "scale(1)";
            
            // MNIEJSZA SKALA (80% zamiast 88-96%) - tekst będzie mniejszy i dalej od brzegów
            const vW = window.innerWidth * 0.80; 
            const vH = window.innerHeight * 0.80; 
            
            const tW = shifter.offsetWidth;
            const tH = shifter.offsetHeight;

            const scaleX = vW / tW;
            const scaleY = vH / tH;

            const finalScale = Math.min(scaleX, scaleY);
            shifter.style.transform = `scale(${finalScale})`;
        }

        bc.onmessage = (msg) => {
            if (msg.data.action === 'update') {
                const content = msg.data.text ? msg.data.text : "";
                
                viewport.classList.add('fade-out');

                setTimeout(() => {
                    shifter.innerText = content;
                    
                    if (content.trim() === "") {
                        body.classList.add('no-text');
                    } else {
                        body.classList.remove('no-text');
                        forceScale();
                    }
                    viewport.classList.remove('fade-out');
                }, 100);
            }
        };

        window.onresize = forceScale;
        window.onload = forceScale;
    </script>
</body>
</html>
