<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <style>
        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            color: #ff9500; /* Klasyczny kolor diody bursztynowej */
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold; /* Normalny-bold, nie przesadzony */
            text-transform: uppercase;
        }

        /* WARSTWA 1: FIZYCZNE WGŁĘBIENIA W TABLICY (TŁO) */
        .led-panel {
            position: absolute;
            width: 100%; height: 100%;
            /* Symulacja plastikowej kratki, w której siedzą diody */
            background: 
                radial-gradient(circle at center, #111 20%, #000 40%);
            background-size: 22px 22px; /* ROZMIAR POJEDYNCZEJ DIODY */
            z-index: 1;
        }

        /* WARSTWA 2: TEKST JAKO ZBIÓR ŚWIECĄCYCH PUNKTÓW */
        #display-text {
            position: relative;
            width: 92%;
            font-size: 8vw;
            line-height: 1.2;
            text-align: left;
            white-space: pre-wrap;
            letter-spacing: 2px;
            z-index: 5;

            /* KLUCZ DO REALIZMU: MASKA WYCINAJĄCA IDEALNE DIODY */
            -webkit-mask-image: radial-gradient(circle, white 35%, transparent 45%);
            mask-image: radial-gradient(circle, white 35%, transparent 45%);
            mask-size: 22px 22px; /* Musi być identyczny z background-size panelu! */
            
            /* EFEKT ŚWIECENIA GAZU W DIODZIE */
            text-shadow: 
                0 0 5px rgba(255, 149, 0, 1),
                0 0 15px rgba(255, 149, 0, 0.5);
            
            /* Wyłączenie wygładzania fontu, by krawędzie były ostre na kropkach */
            -webkit-font-smoothing: none;
        }

        /* WARSTWA 3: SZKLANY REFLEKS / KURZ NA EKRANIE (Dla realizmu) */
        .glass-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            /* Delikatne poziome linie skanowania jak w starym TV */
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15) 0px,
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="led-panel"></div>
    <div class="glass-overlay"></div>
    <div id="display-text">ZAŁADUJ PIEŚŃ...</div>

    <script>
        const bc = new BroadcastChannel('church_system');
        const box = document.getElementById('display-text');

        bc.onmessage = (msg) => {
            if (msg.data.action === 'update') {
                // Szybki efekt "odświeżania" matrycy
                box.style.opacity = 0;
                setTimeout(() => {
                    box.innerText = msg.data.text;
                    box.style.opacity = 1;
                }, 40);
            } else if (msg.data.action === 'clear') {
                box.innerText = '';
            }
        };
    </script>
</body>
</html>
