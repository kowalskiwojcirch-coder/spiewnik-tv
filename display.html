<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <style>
        /* RESET WSZYSTKIEGO */
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; background: #000; color: #ff9d00;
            height: 100vh; width: 100vw; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            font-family: Arial, sans-serif; font-weight: 100; text-transform: uppercase;
        }

        /* TŁO MATRYCY */
        .led-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255,255,255,0.01) 1px, transparent 1px);
            background-size: 16px 16px; z-index: 1;
        }

        /* STATYCZNE GWIAZDKI */
        .corner-star {
            position: absolute; font-size: 140px; color: #ff9d00;
            opacity: 0; z-index: 20; transition: opacity 0.1s;
            -webkit-mask-image: radial-gradient(circle, white 40%, transparent 60%);
            mask-size: 12px 12px;
        }
        body.no-text .corner-star { opacity: 0.8; }
        .tl { top: 0; left: 10px; } .tr { top: 0; right: 10px; }
        .bl { bottom: 0; left: 10px; } .br { bottom: 0; right: 10px; }

        /* KONTENER TEKSTU */
        #display-container {
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.05s linear; /* BŁYSKAWICZNE PRZEJŚCIE */
            z-index: 10;
        }

        /* TEKST - ABSOLUTNE MAKSIMUM */
        #display-text {
            display: inline-block;
            width: 100%;
            text-align: left; 
            white-space: pre-wrap;
            /* EKSTREMALNIE CIASNE LINIE - KLUCZ DO WIELKOŚCI */
            line-height: 0.7; 
            letter-spacing: -0.02em; 
            font-size: 50vh; /* Start od połowy wysokości ekranu na literę! */
            
            -webkit-mask-image: radial-gradient(circle, white 45%, transparent 55%);
            mask-image: radial-gradient(circle, white 45%, transparent 55%);
            mask-size: 0.04em 0.04em; 

            text-shadow: 0 0 15px rgba(255, 157, 0, 0.6);
        }

        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, transparent 2px);
            z-index: 15; pointer-events: none;
        }

        .fade-out { opacity: 0 !important; }
    </style>
</head>
<body class="no-text">

    <div class="corner-star tl">*</div><div class="corner-star tr">*</div>
    <div class="corner-star bl">*</div><div class="corner-star br">*</div>

    <div class="led-bg"></div>
    <div class="scanlines"></div>
    
    <div id="display-container">
        <div id="display-text"></div>
    </div>

    <script>
        const bc = new BroadcastChannel('church_system');
        const box = document.getElementById('display-text');
        const container = document.getElementById('display-container');
        const body = document.body;

        function adjustFontSize() {
            // Startujemy od absurdalnie wielkiego fontu
            let fontSize = 50; 
            box.style.fontSize = fontSize + "vh";

            // Wykorzystujemy 99% dostępnej przestrzeni
            const maxHeight = window.innerHeight * 0.99;
            const maxWidth = window.innerWidth * 0.99;

            // Zmniejszaj tylko tyle, ile trzeba żeby nie wystawało
            while ((box.offsetHeight > maxHeight || box.offsetWidth > maxWidth) && fontSize > 1) {
                fontSize -= 0.1;
                box.style.fontSize = fontSize + "vh";
            }
        }

        bc.onmessage = (msg) => {
            if (msg.data.action === 'update') {
                const content = msg.data.text ? msg.data.text.trim() : "";
                
                container.classList.add('fade-out');

                setTimeout(() => {
                    box.innerText = content;
                    
                    if (content === "") {
                        body.classList.add('no-text');
                    } else {
                        body.classList.remove('no-text');
                        adjustFontSize();
                    }
                    container.classList.remove('fade-out');
                }, 50); // Skrócone do 50ms dla turbo reakcji
            }
        };

        window.onresize = adjustFontSize;
        // Inicjalizacja przy ładowaniu
        window.onload = adjustFontSize;
    </script>
</body>
</html>
