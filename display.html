<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <style>
        /* Czcionka pixelowa obsługująca polskie znaki */
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body, html { 
            margin: 0; padding: 0; background: #000; 
            height: 100vh; width: 100vw; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* TŁO: SIATKA GASZĄCA (Kropki tam gdzie nie ma liter) */
        .matrix-bg {
            position: absolute;
            width: 100%; height: 100%;
            background-image: radial-gradient(#151515 20%, transparent 25%);
            background-size: 16px 16px;
            z-index: 1;
        }

        /* SIATKA "MONITORKÓW" (Linie podziału modułów) */
        .led-grid {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0,0,0,1) 2px, transparent 2px),
                linear-gradient(90deg, rgba(0,0,0,1) 2px, transparent 2px);
            background-size: 16px 16px;
            z-index: 10;
            pointer-events: none;
        }

        /* TEKST */
        #display-text {
            color: #ff9d00;
            font-family: 'Press Start 2P', cursive; /* Idealna czcionka kropkowa */
            font-size: 5.5vw; 
            line-height: 1.8;
            text-align: left;
            width: 92%;
            white-space: pre-wrap;
            text-transform: uppercase;
            letter-spacing: 4px;
            z-index: 5;

            /* MASKA KROPEK - synchronizacja 16px */
            -webkit-mask-image: radial-gradient(circle, white 40%, transparent 50%);
            mask-image: radial-gradient(circle, white 40%, transparent 50%);
            mask-size: 16px 16px; 
            
            text-shadow: 0 0 10px rgba(255, 157, 0, 0.7);
        }
    </style>
</head>
<body>
    <div class="matrix-bg"></div>
    <div class="led-grid"></div>
    <div id="display-text">ŁADOWANIE...</div>

    <script>
        const bc = new BroadcastChannel('church_system');
        const output = document.getElementById('display-text');

        bc.onmessage = (msg) => {
            if (msg.data.action === 'update') {
                output.innerText = msg.data.text;
            } else if (msg.data.action === 'clear') {
                output.innerText = '';
            }
        };
    </script>
</body>
</html>
