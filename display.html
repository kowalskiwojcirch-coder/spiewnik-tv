<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <style>
        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            color: #ff9d00;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            /* ZMIANA: Cieńszy Arial dla lepszej czytelności */
            font-family: Arial, sans-serif;
            font-weight: normal; 
            text-transform: uppercase;
        }

        /* TŁO: DELIKATNE PUNKTY MATRYCY */
        .matrix-dots-bg {
            position: absolute;
            width: 100%; height: 100%;
            background-image: radial-gradient(#111 15%, transparent 20%);
            background-size: 25px 25px; /* Średni rozmiar kropki */
            z-index: 1;
        }

        /* SIATKA "MONITORKÓW" - CIEŃSZE LINIE */
        .led-grid {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            /* Cieńsze fugi (3px), żeby nie "duszyły" liter */
            background-image: 
                linear-gradient(rgba(0,0,0,1) 3px, transparent 3px),
                linear-gradient(90deg, rgba(0,0,0,1) 3px, transparent 3px);
            background-size: 25px 25px;
            z-index: 10;
            pointer-events: none;
        }

        /* TEKST - KROPKOWANY, ALE SMUKŁY */
        #display-text {
            width: 90%;
            font-size: 7vw; /* Mniejszy font, żeby więcej się mieściło */
            line-height: 1.3;
            text-align: left;
            white-space: pre-wrap;
            z-index: 5;
            letter-spacing: 2px;
            
            /* MASKA: Tnie smukłe litery na wyraźne kropki */
            -webkit-mask-image: radial-gradient(circle, white 35%, transparent 45%);
            mask-image: radial-gradient(circle, white 35%, transparent 45%);
            mask-size: 25px 25px; 

            /* Subtelniejszy blask */
            text-shadow: 0 0 8px rgba(255, 157, 0, 0.5);
            
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="matrix-dots-bg"></div>
    <div class="led-grid"></div>
    <div id="display-text">BĘDĘ PANU W KAŻDEJ PORZE...</div>

    <script>
        const bc = new BroadcastChannel('church_system');
        const box = document.getElementById('display-text');

        bc.onmessage = (msg) => {
            if (msg.data.action === 'update') {
                box.innerText = msg.data.text;
            } else if (msg.data.action === 'clear') {
                box.innerText = '';
            }
        };
    </script>
</body>
</html>
