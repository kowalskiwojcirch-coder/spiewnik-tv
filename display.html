<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <style>
        body, html {
            margin: 0; padding: 0; background: #000; color: #ff9d00;
            height: 100vh; width: 100vw; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            font-family: Arial, sans-serif; font-weight: 100; text-transform: uppercase;
        }

        /* TŁO MATRYCY */
        .led-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255,255,255,0.01) 1px, transparent 1px);
            background-size: 16px 16px; z-index: 1;
        }

        /* WIELKIE GWIAZDKI */
        .corner-star {
            position: absolute;
            font-size: 100px; /* Jeszcze większe */
            color: #ff9d00;
            opacity: 0;
            transition: opacity 0.6s ease-in-out;
            z-index: 20;
            -webkit-mask-image: radial-gradient(circle, white 35%, transparent 65%);
            mask-size: 10px 10px;
            text-shadow: 0 0 25px rgba(255, 157, 0, 0.7);
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.1); opacity: 0.6; }
            100% { transform: scale(1); opacity: 0.3; }
        }

        body.no-text .corner-star {
            opacity: 0.6;
            animation: pulse 4s infinite ease-in-out;
        }

        .tl { top: 30px; left: 30px; }
        .tr { top: 30px; right: 30px; }
        .bl { bottom: 30px; left: 30px; }
        .br { bottom: 30px; right: 30px; }

        /* TEKST GŁÓWNY - POWIĘKSZONY */
        #display-text {
            position: relative; 
            width: 94vw; 
            z-index: 10;
            text-align: left; 
            white-space: pre-wrap;
            line-height: 1.05; 
            letter-spacing: 0.1em;
            
            /* POCZĄTKOWY ROZMIAR - POWRÓT DO DUŻEGO */
            font-size: 18vh; 

            /* KROPKI: IDEALNIE WYŚRODKOWANE */
            -webkit-mask-image: radial-gradient(circle, white 38%, transparent 55%);
            mask-image: radial-gradient(circle, white 38%, transparent 55%);
            mask-size: 0.09em 0.09em; 
            -webkit-mask-size: 0.09em 0.09em;

            text-shadow: 0 0 12px rgba(255, 157, 0, 0.4);
            transition: opacity 0.15s;
        }

        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.12) 0px, transparent 2px);
            z-index: 15; pointer-events: none;
        }
    </style>
</head>
<body class="no-text">

    <div class="corner-star tl">*</div>
    <div class="corner-star tr">*</div>
    <div class="corner-star bl">*</div>
    <div class="corner-star br">*</div>

    <div class="led-bg"></div>
    <div class="scanlines"></div>
    <div id="display-text"></div>

    <script>
        const bc = new BroadcastChannel('church_system');
        const box = document.getElementById('display-text');
        const body = document.body;

        function adjustFontSize() {
            // Startujemy od dużej czcionki (18vh to prawie 1/5 ekranu na wysokość litery)
            let fontSize = 18; 
            box.style.fontSize = fontSize + "vh";

            // Zmniejszamy tylko tyle, ile absolutnie trzeba, by zmieścić 8 linii
            while ((box.scrollHeight > window.innerHeight * 0.90 || box.scrollWidth > window.innerWidth * 0.94) && fontSize > 2) {
                fontSize -= 0.3;
                box.style.fontSize = fontSize + "vh";
            }
        }

        bc.onmessage = (msg) => {
            if (msg.data.action === 'update') {
                const content = msg.data.text ? msg.data.text.trim() : "";
                box.innerText = content;
                
                if (content === "") {
                    body.classList.add('no-text');
                } else {
                    body.classList.remove('no-text');
                }
                
                requestAnimationFrame(adjustFontSize);
            }
        };

        window.onresize = adjustFontSize;
    </script>
</body>
</html>
