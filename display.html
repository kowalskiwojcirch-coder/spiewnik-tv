<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <style>
        body, html {
            margin: 0; padding: 0; background: #000; color: #ff9d00;
            height: 100vh; width: 100vw; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            font-family: Arial, sans-serif; font-weight: 100; text-transform: uppercase;
        }

        .led-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255,255,255,0.01) 1px, transparent 1px);
            background-size: 16px 16px; z-index: 1;
        }

        /* GWIAZDKI */
        .corner-star {
            position: absolute; font-size: 100px; color: #ff9d00;
            opacity: 0; z-index: 20; transition: opacity 0.5s ease;
            -webkit-mask-image: radial-gradient(circle, white 40%, transparent 60%);
            mask-size: 10px 10px;
        }
        body.no-text .corner-star { opacity: 0.7; }
        .tl { top: 20px; left: 20px; } .tr { top: 20px; right: 20px; }
        .bl { bottom: 20px; left: 20px; } .br { bottom: 20px; right: 20px; }

        /* KONTENER ANIMACJI */
        #display-container {
            width: 98vw; height: 96vh;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.3s ease-in-out; /* PŁYNNE PRZEJŚCIE */
            opacity: 1; z-index: 10;
        }

        /* TEKST - EKSTREMALNIE WIELKI */
        #display-text {
            width: 100%;
            text-align: left; white-space: pre-wrap;
            line-height: 0.8; /* Jeszcze ciaśniej dla większych liter */
            letter-spacing: -0.02em; 
            font-size: 30vh; /* Start od ogromu */
            
            -webkit-mask-image: radial-gradient(circle, white 45%, transparent 55%);
            mask-image: radial-gradient(circle, white 45%, transparent 55%);
            mask-size: 0.06em 0.06em; 

            text-shadow: 0 0 15px rgba(255, 157, 0, 0.4);
            display: inline-block;
            transform-origin: center;
        }

        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, transparent 2px);
            z-index: 15; pointer-events: none;
        }

        /* Klasa do animacji znikania */
        .fade-out { opacity: 0 !important; }
    </style>
</head>
<body class="no-text">

    <div class="corner-star tl">*</div><div class="corner-star tr">*</div>
    <div class="corner-star bl">*</div><div class="corner-star br">*</div>

    <div class="led-bg"></div>
    <div class="scanlines"></div>
    
    <div id="display-container">
        <div id="display-text"></div>
    </div>

    <script>
        const bc = new BroadcastChannel('church_system');
        const box = document.getElementById('display-text');
        const container = document.getElementById('display-container');
        const body = document.body;

        function adjustFontSize() {
            let fontSize = 35; // Gigantyczny start
            box.style.fontSize = fontSize + "vh";

            const maxHeight = window.innerHeight * 0.94;
            const maxWidth = window.innerWidth * 0.96;

            // Zmniejszaj font tylko do momentu aż zmieści się w pionie/poziomie
            while ((box.scrollHeight > maxHeight || box.scrollWidth > maxWidth) && fontSize > 1) {
                fontSize -= 0.2;
                box.style.fontSize = fontSize + "vh";
            }
        }

        bc.onmessage = (msg) => {
            if (msg.data.action === 'update') {
                const content = msg.data.text ? msg.data.text.trim() : "";
                
                // 1. Rozpocznij wygaszanie
                container.classList.add('fade-out');

                setTimeout(() => {
                    // 2. Zmień tekst w trakcie gdy jest niewidoczny
                    box.innerText = content;
                    
                    if (content === "") {
                        body.classList.add('no-text');
                    } else {
                        body.classList.remove('no-text');
                        adjustFontSize();
                    }

                    // 3. Pokaż nowy tekst
                    container.classList.remove('fade-out');
                }, 300); // Czas trwania animacji w CSS
            }
        };

        window.onresize = adjustFontSize;
    </script>
</body>
</html>
