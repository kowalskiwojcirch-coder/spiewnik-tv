<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <style>
        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            color: #ff9d00;
            height: 100vh; width: 100vw;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* TŁO: STATYCZNA MATRYCA (opcjonalnie, można usunąć jeśli przeszkadza) */
        .led-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: 1;
        }

        #display-text {
            position: relative;
            width: 90vw;
            text-align: left;
            white-space: pre-wrap;
            z-index: 5;
            line-height: 1.1;
            /* POCZĄTKOWA WIELKOŚĆ */
            font-size: 10vh; 
            letter-spacing: 0.05em;

            /* KLUCZOWE: Maska przypisana do rozmiaru fontu (em) */
            /* Dzięki temu kropki skalują się RAZEM z tekstem */
            -webkit-mask-image: radial-gradient(circle, white 40%, transparent 55%);
            mask-image: radial-gradient(circle, white 40%, transparent 55%);
            
            /* Ustawienie rozmiaru maski na 0.1em sprawia, że kropka 
               zawsze stanowi 1/10 wysokości litery, nieważne jak tekst się skaluje */
            mask-size: 0.12em 0.12em; 
            -webkit-mask-size: 0.12em 0.12em;

            text-shadow: 0 0 10px rgba(255, 157, 0, 0.5);
        }

        /* Subtelne linie "rastrowe" dla realizmu, które też się nie rozjeżdżają */
        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0) 50%, rgba(0,0,0,0.5) 50%);
            background-size: 100% 4px;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="led-bg"></div>
    <div class="scanlines"></div>
    <div id="display-text">ZAŁADUJ...</div>

    <script>
        const bc = new BroadcastChannel('church_system');
        const box = document.getElementById('display-text');

        function adjustFontSize() {
            let fontSize = 18; // Startujemy od bardzo dużego
            box.style.fontSize = fontSize + "vh";

            // Skalowanie w dół, aż się zmieści w pionie i poziomie
            while ((box.scrollHeight > window.innerHeight * 0.85 || box.scrollWidth > window.innerWidth * 0.9) && fontSize > 2) {
                fontSize -= 0.5;
                box.style.fontSize = fontSize + "vh";
            }
        }

        bc.onmessage = (msg) => {
            if (msg.data.action === 'update') {
                box.innerText = msg.data.text;
                setTimeout(adjustFontSize, 10);
            } else if (msg.data.action === 'clear') {
                box.innerText = '';
            }
        };

        window.onresize = adjustFontSize;
    </script>
</body>
</html>
