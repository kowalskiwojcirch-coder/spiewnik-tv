<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <style>
        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            color: #ff9800; /* Klasyczny pomarańczowy */
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            /* FONT ARIAL / BEZSZERYFOWY */
            font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
        }

        /* Delikatna siatka modułowa w tle - daje efekt "telewizora kościelnego" */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 3px 3px;
            z-index: 10;
            pointer-events: none;
        }

        #text-container {
            width: 90%;
            font-size: 7.5vw; /* Bardzo duży i czytelny */
            font-weight: bold;
            line-height: 1.2;
            text-align: left;
            white-space: pre-wrap;
            text-transform: uppercase;
            letter-spacing: -1px; /* Ciasne, nowoczesne Arialowe ustawienie */
            z-index: 5;
            /* Delikatna poświata dla lepszej widoczności w ciemnym kościele */
            text-shadow: 0 0 15px rgba(255, 152, 0, 0.4);
        }

        /* Płynne przejście tekstu */
        #text-container {
            transition: opacity 0.3s ease-in-out;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>
    <div id="text-container">ŁADOWANIE SYSTEMU...</div>

    <script>
        const bc = new BroadcastChannel('church_system');
        const box = document.getElementById('text-container');

        bc.onmessage = (msg) => {
            if (msg.data.action === 'update') {
                box.style.opacity = 0; // Efekt mrugnięcia przy zmianie
                setTimeout(() => {
                    box.innerText = msg.data.text;
                    box.style.opacity = 1;
                }, 50);
            } else if (msg.data.action === 'clear') {
                box.innerText = '';
            }
        };
    </script>
</body>
</html>
