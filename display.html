<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <style>
        body, html { 
            margin: 0; padding: 0; background: #050505; 
            height: 100vh; width: 100vw; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* WARSTWA SIATKI (MAŁE MONITORKI) */
        .led-grid {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            /* Tworzy pionowe i poziome przerwy między modułami */
            background-image: 
                linear-gradient(rgba(0,0,0,1) 2px, transparent 2px),
                linear-gradient(90deg, rgba(0,0,0,1) 2px, transparent 2px);
            background-size: 12px 12px; /* Rozmiar "piksela/modułu" */
            z-index: 10;
            pointer-events: none;
        }

        /* WARSTWA TEKSTU Z EFEKTEM KROPEK */
        #display-text {
            color: #ff9900;
            font-family: 'Courier New', Courier, monospace;
            font-size: 7vw;
            font-weight: 900;
            line-height: 1.1;
            text-align: left;
            width: 90%;
            white-space: pre-wrap;
            text-transform: uppercase;
            letter-spacing: 4px;

            /* EFEKT KROPEK (Maska) */
            -webkit-mask-image: radial-gradient(circle, #fff 35%, transparent 45%);
            mask-image: radial-gradient(circle, #fff 35%, transparent 45%);
            mask-size: 6px 6px; /* Gęstość kropek w literach */

            /* POŚWIATA LED */
            text-shadow: 0 0 15px rgba(255, 153, 0, 0.6);
        }

        /* TŁO MATRYCY */
        .matrix-bg {
            position: absolute;
            width: 100%; height: 100%;
            background: radial-gradient(#111 1px, transparent 0);
            background-size: 12px 12px;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="matrix-bg"></div>
    <div class="led-grid"></div>
    <div id="display-text"></div>

    <script>
        const bc = new BroadcastChannel('church_system');
        const output = document.getElementById('display-text');

        bc.onmessage = (msg) => {
            if (msg.data.action === 'update') {
                output.innerText = msg.data.text;
            } else if (msg.data.action === 'clear') {
                output.innerText = '';
            }
        };
    </script>
</body>
</html>
